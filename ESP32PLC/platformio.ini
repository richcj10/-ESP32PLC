; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
framework = arduino
monitor_speed = 115200
monitor_port = COM17
monitor_echo = yes
upload_port = COM17
upload_speed = 921600
;upload_protocol = espota
;upload_port = ESPPLC-18244
;upload_port = 192.168.X.X
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
	-I src
	-DBOARD_HAS_PSRAM
	-DDISPLAY_TFT
	; swap to -DDISPLAY_OLED for OLED hardware
lib_deps =
	adafruit/Adafruit GFX Library@^1.10.10
	knolleary/PubSubClient@^2.8.0
	adafruit/Adafruit SSD1306@^2.4.6
	adafruit/Adafruit BusIO@^1.8.3
	https://github.com/husarnet/AsyncTCP.git
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	bblanchon/ArduinoJson @ 6.17
	bodmer/TFT_eSPI@^2.4.61
	bitbank2/PNGdec@^1.0.1
	fastled/FastLED@^3.5.0
	ricmoo/QRCode@^0.0.1
