; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
framework = arduino
monitor_speed = 115200
monitor_port = COM17
monitor_echo = yes
;upload_port = COM13
;upload_speed = 921600
upload_protocol = espota
;upload_port = ESPPLC-18244
upload_port = 192.168.X.X9
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
	-I src
	-DBOARD_HAS_PSRAM
	-DDISPLAY_TFT
	; swap to -DDISPLAY_OLED for OLED hardware
	; TFT_eSPI settings via build_flags — bypasses User_Setup.h include entirely
	; (robust against clean builds — USER_SETUP_LOADED skips the header mechanism)
	-DUSER_SETUP_LOADED
	-DUSER_SETUP_ID=203
	-DST7789_DRIVER
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_RGB_ORDER=TFT_RGB
	-DTFT_INVERSION_OFF
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=5
	-DTFT_RST=4
	-DUSE_FSPI_PORT
	-DLOAD_GLCD
	-DLOAD_FONT2
	-DLOAD_FONT4
	-DLOAD_FONT6
	-DLOAD_FONT7
	-DLOAD_FONT8
	-DLOAD_GFXFF
	-DSMOOTH_FONT
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
lib_extra_dirs = c:\Repo\ESP32ModbusMaster
lib_deps =
	adafruit/Adafruit GFX Library@^1.10.10
	knolleary/PubSubClient@^2.8.0
	adafruit/Adafruit SSD1306@^2.4.6
	adafruit/Adafruit BusIO@^1.8.3
	https://github.com/husarnet/AsyncTCP.git
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	bblanchon/ArduinoJson @ 6.17
	bodmer/TFT_eSPI@^2.4.61
	bitbank2/PNGdec@^1.0.1
	fastled/FastLED@3.5.0
	ricmoo/QRCode@^0.0.1
